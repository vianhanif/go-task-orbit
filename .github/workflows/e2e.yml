name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: arduino/setup-task@v2
        with:
          version: '3.x'
      - run: task lint
      - run: task test

  e2e-aws:
    runs-on: ubuntu-latest
    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - uses: arduino/setup-task@v2
        with:
          version: '3.x'
      - run: task e2e-ci
