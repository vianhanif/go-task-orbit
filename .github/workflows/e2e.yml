name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - uses: arduino/setup-task@v2
        with:
          version: '3.x'
      - run: task lint
      - run: task test

  e2e-aws:
    runs-on: ubuntu-latest
    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_SESSION_TOKEN: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false
      - uses: arduino/setup-task@v2
        with:
          version: '3.x'
      - run: task e2e-ci
