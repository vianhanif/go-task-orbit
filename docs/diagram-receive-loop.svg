<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 450" width="850" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="850" height="450" rx="16" fill="url(#bg)"/>

  <text x="425" y="42" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Receive Loop</text>
  <text x="425" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8b949e">Transport → Poller → Ring Buffer / Timer Wheel → Dispatcher</text>

  <!-- Column headers -->
  <rect x="30" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Transport</text>

  <rect x="200" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#22c55e">Poller</text>

  <rect x="370" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Ring Buffer</text>

  <rect x="540" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="605" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#f0883e">Timer Wheel</text>

  <rect x="710" y="85" width="115" height="38" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="767" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Dispatcher</text>

  <!-- Lifelines -->
  <line x1="95" y1="123" x2="95" y2="400" stroke="#3fb950" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="265" y1="123" x2="265" y2="400" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="435" y1="123" x2="435" y2="400" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="605" y1="123" x2="605" y2="400" stroke="#f0883e" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="767" y1="123" x2="767" y2="400" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>

  <!-- Step 1: Transport → Poller -->
  <line x1="95" y1="155" x2="255" y2="155" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="175" y="148" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#3fb950" opacity="0.8">batch ReceiveMessage</text>

  <!-- Step 2: Poller self (check NotBefore) -->
  <rect x="222" y="175" width="86" height="24" rx="5" fill="#22c55e" opacity="0.1"/>
  <text x="265" y="192" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">NotBefore &gt; 0?</text>

  <!-- Step 3a: Timer Wheel path -->
  <line x1="265" y1="210" x2="595" y2="210" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="430" y="203" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f0883e" opacity="0.8">Insert(msg, delay) — NotBefore set</text>

  <!-- Timer Wheel → Ring Buffer -->
  <path d="M 605 215 L 605 260 L 445 260" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>
  <text x="525" y="255" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f0883e" opacity="0.8">expire → Enqueue</text>

  <!-- Step 3b: Immediate path -->
  <line x1="265" y1="210" x2="425" y2="300" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <text x="315" y="250" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e" opacity="0.8">Immediate</text>

  <!-- Enqueue to Ring Buffer -->
  <rect x="395" y="295" width="80" height="22" rx="5" fill="#22c55e" opacity="0.1"/>
  <text x="435" y="311" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">Enqueue(msg)</text>

  <!-- Step 4: Dispatcher → Ring Buffer -->
  <line x1="767" y1="340" x2="445" y2="340" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="600" y="333" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#d2a8ff" opacity="0.8">DequeueBatch</text>

  <!-- Decision box -->
  <rect x="200" y="360" width="130" height="38" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1" opacity="0.5"/>
  <text x="265" y="377" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">dispatch to</text>
  <text x="265" y="392" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">worker pool</text>
</svg>
