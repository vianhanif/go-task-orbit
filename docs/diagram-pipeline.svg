<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <rect width="1000" height="340" rx="16" fill="url(#bg)"/>

  <text x="500" y="42" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Pipeline</text>
  <text x="500" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8b949e">Producer → Transport → Poller → Ring Buffer → Dispatcher → Idempotency → Worker Pool → Ack/Retry/DLQ</text>

  <!-- Producer -->
  <rect x="20" y="130" width="100" height="55" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="70" y="155" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer</text>
  <text x="70" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Publish</text>

  <!-- Transport -->
  <rect x="155" y="130" width="100" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="155" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Transport</text>
  <text x="205" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Receive</text>

  <!-- Poller -->
  <rect x="290" y="130" width="100" height="55" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="155" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#22c55e">Poller</text>
  <text x="340" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Enqueue</text>

  <!-- Ring Buffer -->
  <rect x="425" y="124" width="110" height="65" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="150" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Ring</text>
  <text x="480" y="167" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold" fill="#d2a8ff">Buffer</text>
  <text x="480" y="182" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#8b949e">Dequeue</text>

  <!-- Dispatcher -->
  <rect x="570" y="130" width="105" height="55" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="622" y="155" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#f0883e">Dispatcher</text>
  <text x="622" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Filter</text>

  <!-- Idempotency -->
  <rect x="710" y="130" width="110" height="55" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="765" y="150" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Idempotency</text>
  <text x="765" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Dispatch</text>

  <!-- Worker Pool -->
  <rect x="855" y="124" width="120" height="65" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="915" y="150" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Worker</text>
  <text x="915" y="167" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" font-weight="bold" fill="#d2a8ff">Pool</text>
  <text x="915" y="182" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#8b949e">process</text>

  <!-- Forward arrows -->
  <line x1="120" y1="158" x2="147" y2="158" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="255" y1="158" x2="282" y2="158" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="390" y1="158" x2="417" y2="158" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="535" y1="158" x2="562" y2="158" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="675" y1="158" x2="702" y2="158" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="820" y1="158" x2="847" y2="158" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Return arrows from Worker Pool -->
  <!-- Ack → Transport -->
  <path d="M 890 190 L 890 240 L 205 240 L 205 193" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="560" y="234" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#3fb950">Ack (delete msg)</text>

  <!-- Retry → Ring -->
  <path d="M 930 190 L 930 270 L 480 270 L 480 197" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>
  <text x="710" y="264" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#f0883e">Retry (re‑enqueue)</text>

  <!-- DLQ → Transport -->
  <path d="M 960 160 L 960 300 L 205 300 L 205 193" fill="none" stroke="#f85149" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)"/>
  <text x="580" y="294" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#f85149">DLQ (dead‑letter)</text>
</svg>
