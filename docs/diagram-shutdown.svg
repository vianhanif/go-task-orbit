<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" width="850" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="850" height="500" rx="16" fill="url(#bg)"/>

  <text x="425" y="42" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Graceful Shutdown</text>
  <text x="425" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8b949e">SIGTERM → cancel poller → flush timer → drain ring → ack inflight → exit</text>

  <!-- Column headers -->
  <rect x="25" y="85" width="120" height="38" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#f0883e">SIGTERM</text>

  <rect x="180" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="245" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Pipeline</text>

  <rect x="345" y="85" width="120" height="38" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="405" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#22c55e">Poller</text>

  <rect x="500" y="85" width="130" height="38" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Ring Buffer</text>

  <rect x="665" y="85" width="95" height="38" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="712" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Workers</text>

  <rect x="780" y="85" width="50" height="38" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <text x="805" y="110" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.6">Transport</text>

  <!-- Lifelines -->
  <line x1="85" y1="123" x2="85" y2="460" stroke="#f0883e" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="245" y1="123" x2="245" y2="460" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="405" y1="123" x2="405" y2="460" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="565" y1="123" x2="565" y2="460" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="712" y1="123" x2="712" y2="460" stroke="#3fb950" stroke-width="1" stroke-dasharray="4 4" opacity="0.25"/>
  <line x1="805" y1="123" x2="805" y2="460" stroke="#8b949e" stroke-width="1" stroke-dasharray="4 4" opacity="0.15"/>

  <!-- Step 1: SIGTERM → Pipeline -->
  <text x="10" y="158" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">1</text>
  <line x1="85" y1="150" x2="235" y2="150" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="160" y="143" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f0883e" opacity="0.8">signal received</text>

  <!-- Step 2: Pipeline → Poller -->
  <text x="10" y="188" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">2</text>
  <line x1="245" y1="180" x2="395" y2="180" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="320" y="173" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#58a6ff" opacity="0.8">cancel context</text>

  <!-- Step 3: Poller self -->
  <text x="10" y="218" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">3</text>
  <rect x="362" y="210" width="86" height="22" rx="5" fill="#22c55e" opacity="0.1"/>
  <text x="405" y="226" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#22c55e">stop ReceiveMessage</text>

  <!-- Step 4: Pipeline → Ring Buffer -->
  <text x="10" y="265" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">4</text>
  <line x1="245" y1="257" x2="555" y2="257" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="400" y="250" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#58a6ff" opacity="0.8">flush timer wheel</text>

  <!-- Step 5: Ring Buffer → Workers -->
  <text x="10" y="300" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">5</text>
  <line x1="565" y1="292" x2="702" y2="292" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="635" y="285" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#d2a8ff" opacity="0.8">drain remaining msgs</text>

  <!-- Step 6: Workers self -->
  <text x="10" y="335" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">6</text>
  <rect x="665" y="325" width="94" height="22" rx="5" fill="#3fb950" opacity="0.1"/>
  <text x="712" y="341" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#3fb950">finish inflight handlers</text>

  <!-- Step 7: Workers → Transport -->
  <text x="10" y="368" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">7</text>
  <line x1="712" y1="360" x2="797" y2="360" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="755" y="353" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">Ack completed</text>

  <!-- Step 8: Pipeline → Workers -->
  <text x="10" y="398" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">8</text>
  <line x1="245" y1="390" x2="702" y2="390" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="470" y="383" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#58a6ff" opacity="0.8">stop dispatching</text>

  <!-- Step 9: Workers → Pipeline -->
  <text x="10" y="425" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">9</text>
  <path d="M 712 417 L 255 417" stroke="#3fb950" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowGreen)"/>
  <text x="480" y="410" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#3fb950" opacity="0.8">all workers exited</text>

  <!-- Step 10: Pipeline → SIGTERM -->
  <text x="10" y="452" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e" opacity="0.5">10</text>
  <path d="M 245 445 L 95 445" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>
  <text x="170" y="438" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#3fb950" opacity="0.8">graceful exit</text>
</svg>
