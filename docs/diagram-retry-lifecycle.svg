<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="900" height="550">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <rect width="900" height="550" rx="16" fill="url(#bg)"/>

  <text x="450" y="42" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="20" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Retry → DLQ Lifecycle</text>
  <text x="450" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8b949e">state machine — from receipt to terminal (Acked / DeadLettered)</text>

  <!-- ===== ROW 1: Start → Received ===== -->
  <circle cx="450" cy="100" r="12" fill="#161b22" stroke="#e6edf3" stroke-width="1.5"/>
  <circle cx="450" cy="100" r="6" fill="#e6edf3"/>

  <rect x="395" y="130" width="110" height="48" rx="24" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="160" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#58a6ff">Received</text>

  <line x1="450" y1="112" x2="450" y2="122" stroke="#e6edf3" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== ROW 2: Processing → Acked ===== -->
  <rect x="395" y="210" width="110" height="48" rx="24" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="240" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#d2a8ff">Processing</text>

  <line x1="450" y1="178" x2="450" y2="202" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="462" y="194" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">Handler called</text>

  <!-- Acked -->
  <rect x="590" y="210" width="100" height="48" rx="24" fill="#0f1a10" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="240" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#3fb950">Acked</text>

  <line x1="505" y1="234" x2="582" y2="234" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="545" y="227" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">ResultAck</text>

  <!-- [*] end Acked -->
  <circle cx="640" cy="158" r="12" fill="#161b22" stroke="#e6edf3" stroke-width="1.5"/>
  <circle cx="640" cy="158" r="6" fill="#e6edf3"/>
  <line x1="640" y1="210" x2="640" y2="178" stroke="#e6edf3" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== ROW 3: Four destination states ===== -->

  <!-- Retrying (left) -->
  <rect x="130" y="320" width="110" height="48" rx="24" fill="#161b22" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="185" y="350" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#f0883e">Retrying</text>

  <path d="M 395 258 L 130 258 L 130 312" fill="none" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="150" y="280" font-family="-apple-system, sans-serif" font-size="9" fill="#f0883e" opacity="0.7">ResultRetry</text>

  <!-- DelayedRetry (center-left) -->
  <rect x="290" y="320" width="125" height="48" rx="24" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="352" y="345" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#58a6ff">DelayedRetry</text>
  <text x="352" y="361" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">Nack (vis timeout)</text>

  <path d="M 450 258 L 450 285 L 352 312" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="415" y="298" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">RetryWithDelay</text>

  <!-- DeadLettered (center-right) -->
  <rect x="465" y="320" width="130" height="48" rx="24" fill="#3d1414" stroke="#f85149" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="530" y="342" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#f85149">DeadLettered</text>
  <text x="530" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#f85149" opacity="0.7">SendToDLQ</text>

  <path d="M 505 258 L 530 258 L 530 312" fill="none" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="555" y="280" font-family="-apple-system, sans-serif" font-size="9" fill="#f85149" opacity="0.7">ResultDLQ</text>

  <!-- Ring Buffer (right) -->
  <rect x="660" y="320" width="130" height="48" rx="24" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="342" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Ring Buffer</text>
  <text x="725" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">re-enqueue</text>

  <!-- ===== ROW 4: Transport ===== -->
  <rect x="380" y="420" width="130" height="48" rx="24" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="445" y="442" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Transport</text>
  <text x="445" y="460" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">re-deliver</text>

  <!-- ===== HORIZONTAL ARROWS IN ROW 3 ===== -->

  <!-- Retrying → Ring Buffer -->
  <line x1="240" y1="344" x2="652" y2="344" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="446" y="337" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#f0883e" opacity="0.7">re-enqueue into ring</text>

  <!-- DelayedRetry → Transport -->
  <path d="M 352 368 L 352 430 L 372 430" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="365" y="405" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">Nack</text>

  <!-- ===== MAX ATTEMPTS TO DLQ (dashed) ===== -->
  <path d="M 185 368 L 185 500 L 530 500 L 530 376" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowRed)" opacity="0.5"/>
  <text x="360" y="513" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#f85149" opacity="0.6">max attempts exceeded</text>

  <path d="M 352 368 L 352 500" fill="none" stroke="#f85149" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.3"/>

  <!-- ===== LOOP-BACK ARROWS TO RECEIVED ===== -->

  <!-- Ring Buffer → Received (up around right side) -->
  <path d="M 725 320 L 725 160 L 513 160" fill="none" stroke="#d2a8ff" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowPurple)"/>
  <text x="625" y="172" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">dispatcher picks up</text>

  <!-- Transport → Received (up around left side) -->
  <path d="M 445 420 L 445 490 L 50 490 L 50 160 L 387 160" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowGreen)"/>
  <text x="390" y="510" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.6">re-deliver back to queue</text>

  <!-- ===== [*] END DeadLettered ===== -->
  <circle cx="640" cy="295" r="12" fill="#161b22" stroke="#e6edf3" stroke-width="1.5"/>
  <circle cx="640" cy="295" r="6" fill="#e6edf3"/>
  <path d="M 595 335 L 620 335 L 640 307" fill="none" stroke="#e6edf3" stroke-width="2" marker-end="url(#arrowGreen)"/>
</svg>
