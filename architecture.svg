<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="30%" style="stop-color:#3fb950"/>
      <stop offset="60%" style="stop-color:#d2a8ff"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="32" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">
    go-task-orbit
  </text>
  <text x="400" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="13" fill="#8b949e">
    async worker runtime — ring buffer scheduling · pluggable transport (SQS, GCP Pub/Sub) · bounded concurrency
  </text>

  <!-- Outer decorative orbit ring -->
  <circle cx="400" cy="300" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.25" stroke-dasharray="8 4"/>
  <circle cx="400" cy="300" r="150" fill="none" stroke="url(#ringGrad)" stroke-width="0.8" opacity="0.15" stroke-dasharray="3 6"/>

  <!-- ===== CENTRAL RING BUFFER ===== -->
  <circle cx="400" cy="300" r="65" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="400" cy="300" r="55" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="12 6" opacity="0.5"/>
  <circle cx="400" cy="300" r="45" fill="none" stroke="#3fb950" stroke-width="2" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- Ring buffer ring segments -->
  <circle cx="400" cy="255" r="7" fill="#58a6ff" opacity="0.8"/>
  <circle cx="435" cy="270" r="7" fill="#3fb950" opacity="0.8"/>
  <circle cx="445" cy="300" r="7" fill="#d2a8ff" opacity="0.8"/>
  <circle cx="435" cy="330" r="7" fill="#58a6ff" opacity="0.5"/>
  <circle cx="400" cy="345" r="7" fill="#3fb950" opacity="0.5"/>
  <circle cx="365" cy="330" r="7" fill="#d2a8ff" opacity="0.5"/>
  <circle cx="355" cy="300" r="7" fill="#58a6ff" opacity="0.3"/>
  <circle cx="365" cy="270" r="7" fill="#3fb950" opacity="0.3"/>

  <!-- Center text -->
  <text x="400" y="297" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#e6edf3">RING</text>
  <text x="400" y="312" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e">BUFFER</text>

  <!-- ===== LEFT: TRANSPORTS ===== -->
  <!-- Transport group border -->
  <rect x="40" y="220" width="150" height="165" rx="10" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="5 3" opacity="0.5"/>
  <text x="115" y="242" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e" opacity="0.6">pluggable transport</text>

  <!-- SQS -->
  <rect x="60" y="252" width="110" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="276" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">SQS</text>
  <text x="115" y="293" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">AWS Transport</text>

  <!-- Pub/Sub -->
  <rect x="60" y="325" width="110" height="45" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="345" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#22c55e">Pub/Sub</text>
  <text x="115" y="360" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">GCP Transport</text>

  <!-- Arrow: SQS → Ring -->
  <line x1="170" y1="280" x2="288" y2="280" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="230" y="273" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">batch recv</text>

  <!-- Arrow: Pub/Sub → Ring -->
  <line x1="170" y1="348" x2="288" y2="320" stroke="#22c55e" stroke-width="2.2" marker-end="url(#arrowTeal)"/>
  <text x="230" y="328" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#22c55e" opacity="0.7">pull/sub</text>

  <!-- ===== TOP: PRODUCER ===== -->
  <rect x="335" y="140" width="130" height="55" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="163" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#e6edf3">Producers</text>
  <text x="400" y="181" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">Enqueue →</text>

  <!-- Arrow: Producer → Transports -->
  <path d="M 335 168 L 185 168 Q 155 168 155 200 L 155 252" fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- ===== RIGHT: WORKER POOL ===== -->
  <rect x="645" y="225" width="110" height="55" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="249" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Workers</text>
  <text x="700" y="267" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">bounded pool</text>

  <!-- Small worker icons -->
  <rect x="655" y="285" width="18" height="12" rx="3" fill="#d2a8ff" opacity="0.5"/>
  <rect x="677" y="285" width="18" height="12" rx="3" fill="#d2a8ff" opacity="0.6"/>
  <rect x="699" y="285" width="18" height="12" rx="3" fill="#d2a8ff" opacity="0.4"/>
  <rect x="721" y="285" width="18" height="12" rx="3" fill="#d2a8ff" opacity="0.7"/>

  <rect x="645" y="340" width="110" height="55" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="363" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#f0883e">Ack Batcher</text>
  <text x="700" y="381" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">DeleteMsgBatch</text>

  <!-- Arrow: Ring → Workers -->
  <line x1="465" y1="260" x2="638" y2="248" stroke="#d2a8ff" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="555" y="242" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">dispatch</text>

  <!-- Arrow: Workers → Ack -->
  <line x1="700" y1="280" x2="700" y2="334" stroke="#f0883e" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="722" y="310" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#f0883e" opacity="0.7">results</text>

  <!-- Arrow: Ack → SQS (return) -->
  <path d="M 645 360 L 290 360 Q 260 360 260 340 L 260 305" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <text x="460" y="355" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#f0883e" opacity="0.6">ack/delete</text>

  <!-- Arrow: Ack → Pub/Sub (return) -->
  <path d="M 645 380 L 320 380 Q 295 380 295 360 L 295 370" fill="none" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowBlue)" opacity="0.5"/>
  <text x="470" y="392" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="8" fill="#f0883e" opacity="0.5">ack</text>

  <!-- ===== BOTTOM: FEATURE LABELS ===== -->
  <g transform="translate(100, 425)">
    <rect x="0" y="0" width="135" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="67" y="18" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#58a6ff">Idempotency</text>
    <text x="67" y="32" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">pluggable store</text>
  </g>
  <g transform="translate(250, 425)">
    <rect x="0" y="0" width="135" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="67" y="18" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#3fb950">Retry + DLQ</text>
    <text x="67" y="32" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">explicit Result</text>
  </g>
  <g transform="translate(400, 425)">
    <rect x="0" y="0" width="135" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="67" y="18" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#d2a8ff">Observability</text>
    <text x="67" y="32" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">hook-based</text>
  </g>
  <g transform="translate(550, 425)">
    <rect x="0" y="0" width="135" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="67" y="18" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#f0883e">Graceful Drain</text>
    <text x="67" y="32" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e">SIGTERM safe</text>
  </g>
</svg>
