<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" width="540" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#151d28"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f0883e"/>
    </marker>
  </defs>
  <rect width="540" height="260" rx="12" fill="url(#bg)"/>
  <text x="270" y="32" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="15" font-weight="bold" fill="#e6edf3">Go Channel</text>
  <rect x="30" y="70" width="120" height="42" rx="8" fill="url(#card)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="90" y="95" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#e6edf3">Producer 1</text>
  <rect x="30" y="125" width="120" height="42" rx="8" fill="url(#card)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="90" y="150" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#e6edf3">Producer 2</text>
  <rect x="30" y="180" width="120" height="42" rx="8" fill="url(#card)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="90" y="205" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#e6edf3">Producer 3</text>
  <polygon points="275,90 355,65 435,90 435,170 355,195 275,170" fill="url(#hex)" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="355" y="125" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Unbuffered</text>
  <text x="355" y="145" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#8b949e">Channel</text>
  <rect x="460" y="120" width="60" height="42" rx="8" fill="url(#card)" stroke="#30363d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="490" y="145" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="11" fill="#e6edf3">W1</text>
  <line x1="150" y1="91" x2="270" y2="115" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.8"/>
  <line x1="150" y1="146" x2="270" y2="130" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.8"/>
  <line x1="150" y1="201" x2="270" y2="155" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.8"/>
  <line x1="435" y1="130" x2="455" y2="140" stroke="#3fb950" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <path d="M 90 222 L 90 242 L 200 242 L 200 195" stroke="#f0883e" stroke-width="2" stroke-dasharray="6 3" fill="none" marker-end="url(#aOrange)" opacity="0.7"/>
  <text x="200" y="237" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f0883e" opacity="0.7">blocks when slow</text>
</svg>
