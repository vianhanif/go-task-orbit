<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3fb950"/></marker>
    <marker id="aOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f0883e"/></marker>
  </defs>
  <rect width="560" height="280" rx="12" fill="url(#bg)"/>
  <text x="280" y="32" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="15" font-weight="bold" fill="#e6edf3">Go Channel</text>

  <!-- Producers column - aligned left -->
  <rect x="20" y="65" width="130" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="90" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#e6edf3">Producer 1</text>
  <rect x="20" y="125" width="130" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="150" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#e6edf3">Producer 2</text>
  <rect x="20" y="185" width="130" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="210" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#e6edf3">Producer 3</text>

  <!-- Channel - centered -->
  <polygon points="290,115 350,95 410,115 410,175 350,195 290,175" fill="#161b22" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="140" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Unbuffered</text>
  <text x="350" y="158" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#8b949e">Channel</text>

  <!-- Worker - aligned right -->
  <rect x="470" y="125" width="70" height="42" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="505" y="150" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#e6edf3">W1</text>

  <!-- Arrows: Producers → Channel -->
  <line x1="150" y1="86" x2="285" y2="125" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.7"/>
  <line x1="150" y1="146" x2="285" y2="145" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.7"/>
  <line x1="150" y1="206" x2="285" y2="165" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)" opacity="0.7"/>

  <!-- Arrow: Channel → Worker -->
  <line x1="410" y1="145" x2="465" y2="146" stroke="#3fb950" stroke-width="2.5" marker-end="url(#aGreen)"/>

  <!-- Feedback: blocks when slow -->
  <path d="M 85 227 L 85 247 L 200 247 L 200 195" stroke="#f0883e" stroke-width="2" stroke-dasharray="6 3" fill="none" marker-end="url(#aOrange)" opacity="0.7"/>
  <text x="200" y="242" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f0883e" opacity="0.7">blocks when slow</text>
</svg>
