<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <rect width="800" height="350" rx="16" fill="url(#bg)"/>

  <text x="400" y="45" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Go Channel (Unbuffered)</text>
  <text x="400" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#8b949e">single receiver, blocks producer on backpressure</text>

  <!-- Producer boxes -->
  <rect x="40" y="130" width="110" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="157" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer 1</text>

  <rect x="40" y="195" width="110" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="222" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer 2</text>

  <rect x="40" y="260" width="110" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="287" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer 3</text>

  <!-- Arrows: Producers → Channel -->
  <line x1="150" y1="152" x2="260" y2="152" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="217" x2="260" y2="217" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="150" y1="282" x2="260" y2="282" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <text x="205" y="144" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">ch &lt;- msg</text>
  <text x="205" y="209" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">ch &lt;- msg</text>
  <text x="205" y="274" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">ch &lt;- msg</text>

  <!-- Channel diamonds -->
  <polygon points="330,152 390,115 450,152 390,189" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="330,217 390,180 450,217 390,254" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <polygon points="330,282 390,245 450,282 390,319" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Single channel box covering the three -->
  <rect x="330" y="110" width="120" height="220" rx="12" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="390" y="208" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Unbuffered</text>
  <text x="390" y="225" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#3fb950">Channel</text>

  <!-- Arrow: Channel → Worker -->
  <line x1="450" y1="217" x2="530" y2="217" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <text x="490" y="209" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">msg := &lt;-ch</text>

  <!-- Worker box -->
  <rect x="530" y="120" width="130" height="60" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="595" y="148" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Worker 1</text>
  <text x="595" y="166" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">single consumer</text>

  <!-- Backpressure feedback arrow -->
  <path d="M 390 280 L 390 330 L 95 330 L 95 305" fill="none" stroke="#f85149" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowRed)" opacity="0.7"/>
  <text x="245" y="322" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">blocks sender when receiver slow</text>

  <!-- One worker note -->
  <rect x="575" y="200" width="170" height="36" rx="6" fill="#2d1a2e" stroke="#d2a8ff" stroke-width="1" opacity="0.6"/>
  <text x="660" y="216" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#d2a8ff" opacity="0.9">Fan-out needs</text>
  <text x="660" y="230" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#d2a8ff" opacity="0.7">extra orchestration</text>
</svg>
