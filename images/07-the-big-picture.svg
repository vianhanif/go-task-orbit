<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <rect width="700" height="350" rx="8" fill="#0d1117"/>
  <text x="350" y="35" text-anchor="middle" font-family="SF Mono, monospace" font-size="13" font-weight="bold" fill="#e6edf3">The Big Picture</text>
  <rect x="20" y="65" width="200" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="88" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#3fb950">Amazon SQS</text>
  <text x="120" y="105" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Durability, Cross-Pod, HA</text>
  <line x1="100" y1="120" x2="100" y2="155" stroke="#3fb950" stroke-width="2"/>
  <line x1="100" y1="155" x2="350" y2="155" stroke="#3fb950" stroke-width="2"/>
  <line x1="350" y1="155" x2="350" y2="175" stroke="#3fb950" stroke-width="2" marker-end="url(#a)"/>
  <text x="225" y="148" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3fb950" opacity="0.7">batch receive ~10ms</text>
  <rect x="100" y="180" width="500" height="55" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1" stroke-dasharray="6 3"/>
  <rect x="110" y="190" width="140" height="35" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="180" y="205" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#58a6ff">Ring Buffer</text>
  <text x="180" y="218" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8b949e">Scheduling, Batching</text>
  <rect x="280" y="190" width="140" height="35" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="350" y="205" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#d2a8ff">Worker Pool</text>
  <text x="350" y="218" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8b949e">Bounded Concurrency</text>
  <rect x="450" y="190" width="140" height="35" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="520" y="205" text-anchor="middle" font-family="SF Mono, monospace" font-size="9" fill="#f0883e">Ack Batcher</text>
  <text x="520" y="218" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#8b949e">Batch DeleteMessages</text>
  <line x1="250" y1="208" x2="275" y2="208" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#a)" opacity="0.7"/>
  <text x="263" y="201" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#d2a8ff" opacity="0.7">~2μs</text>
  <line x1="420" y1="208" x2="445" y2="208" stroke="#f0883e" stroke-width="1.5" marker-end="url(#a)" opacity="0.7"/>
  <line x1="520" y1="225" x2="520" y2="255" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="520" y1="255" x2="120" y2="255" stroke="#f0883e" stroke-width="1.5"/>
  <line x1="120" y1="255" x2="120" y2="125" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#a)" opacity="0.7"/>
  <text x="320" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#f0883e" opacity="0.7">batch delete ~5ms</text>
  <rect x="30" y="275" width="200" height="45" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1"/>
  <text x="130" y="295" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#58a6ff">Idempotency Store</text>
  <text x="130" y="310" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">In-Memory / Redis / DB</text>
  <rect x="480" y="275" width="200" height="45" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="580" y="295" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#d2a8ff">Metrics / Traces</text>
  <text x="580" y="310" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">via Hooks → OTel</text>
  <line x1="180" y1="208" x2="130" y2="270" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)" opacity="0.6"/>
  <text x="140" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#58a6ff" opacity="0.6">check dedupe</text>
  <line x1="420" y1="208" x2="580" y2="270" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#a)" opacity="0.6"/>
  <text x="530" y="240" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#d2a8ff" opacity="0.6">emit hooks</text>
  <text x="350" y="65" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">[Across the Network — slow, durable]</text>
  <text x="350" y="178" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">[Inside the Process — fast, predictable]</text>
  <text x="350" y="273" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">[External — optional, pluggable]</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/></marker></defs>
</svg>
