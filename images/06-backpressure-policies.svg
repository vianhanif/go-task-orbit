<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420" width="620" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2333"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1e14"/>
      <stop offset="100%" stop-color="#1e1610"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3fb950"/>
    </marker>
    <marker id="aOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#f0883e"/>
    </marker>
  </defs>
  <rect width="620" height="420" rx="12" fill="url(#bg)"/>
  <text x="310" y="32" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="15" font-weight="bold" fill="#e6edf3">Backpressure Policies</text>
  <rect x="220" y="55" width="180" height="50" rx="8" fill="url(#card)" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="78" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#58a6ff">Producer: Enqueue msg</text>
  <text x="310" y="95" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Enqueue →</text>
  <polygon points="310,125 250,148 310,171 370,148" fill="url(#diamond)" stroke="#f0883e" stroke-width="2" filter="url(#shadow)"/>
  <text x="310" y="152" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="10" font-weight="bold" fill="#f0883e">Buffer full?</text>
  <line x1="310" y1="105" x2="310" y2="121" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#aBlue)"/>
  <line x1="250" y1="148" x2="130" y2="148" stroke="#8b949e" stroke-width="2"/>
  <line x1="130" y1="148" x2="130" y2="198" stroke="#3fb950" stroke-width="2.5" marker-end="url(#aGreen)"/>
  <text x="190" y="142" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">No</text>
  <rect x="55" y="202" width="150" height="45" rx="8" fill="url(#card)" stroke="#3fb950" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="130" y="229" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#3fb950">Write to slot</text>
  <line x1="370" y1="148" x2="490" y2="148" stroke="#8b949e" stroke-width="2"/>
  <line x1="490" y1="148" x2="490" y2="198" stroke="#f0883e" stroke-width="2.5" marker-end="url(#aOrange)"/>
  <text x="430" y="142" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Yes</text>
  <polygon points="490,222 450,242 490,262 530,242" fill="url(#diamond)" stroke="#f0883e" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="240" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="10" font-weight="bold" fill="#f0883e">Overflow</text>
  <text x="490" y="254" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="10" font-weight="bold" fill="#f0883e">Policy</text>
  <line x1="450" y1="242" x2="450" y2="288" stroke="#d2a8ff" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="490" y1="262" x2="490" y2="288" stroke="#d2a8ff" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="530" y1="242" x2="530" y2="288" stroke="#d2a8ff" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="570" y1="242" x2="570" y2="288" stroke="#d2a8ff" stroke-width="2" marker-end="url(#aBlue)"/>
  <line x1="450" y1="288" x2="570" y2="288" stroke="#d2a8ff" stroke-width="1.5"/>
  <rect x="20" y="300" width="135" height="55" rx="8" fill="url(#card)" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="87" y="325" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#d2a8ff">Block</text>
  <text x="87" y="342" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Wait for slot</text>
  <rect x="165" y="300" width="135" height="55" rx="8" fill="url(#card)" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="232" y="325" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#d2a8ff">DropNewest</text>
  <text x="232" y="342" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Discard incoming</text>
  <rect x="310" y="300" width="135" height="55" rx="8" fill="url(#card)" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="377" y="325" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#d2a8ff">DropOldest</text>
  <text x="377" y="342" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Overwrite oldest</text>
  <rect x="455" y="300" width="135" height="55" rx="8" fill="url(#card)" stroke="#d2a8ff" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="522" y="325" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" font-weight="bold" fill="#d2a8ff">Reject</text>
  <text x="522" y="342" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Return error</text>
  <line x1="87" y1="288" x2="87" y2="296" stroke="#d2a8ff" stroke-width="2"/>
  <line x1="232" y1="288" x2="232" y2="296" stroke="#d2a8ff" stroke-width="2"/>
  <line x1="377" y1="288" x2="377" y2="296" stroke="#d2a8ff" stroke-width="2"/>
  <line x1="522" y1="288" x2="522" y2="296" stroke="#d2a8ff" stroke-width="2"/>
  <text x="310" y="390" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">Go channels can only Block. The ring buffer supports all four policies.</text>
</svg>
