<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect width="800" height="560" rx="16" fill="url(#bg)"/>

  <text x="400" y="45" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Backpressure Policies</text>
  <text x="400" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#8b949e">configurable overflow behavior when ring buffer is full</text>

  <rect x="310" y="95" width="180" height="45" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="115" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer</text>
  <text x="400" y="132" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">Enqueue(msg)</text>

  <line x1="400" y1="140" x2="400" y2="170" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <polygon points="400,175 480,220 400,265 320,220" fill="#161b22" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="224" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#f0883e">Buffer full?</text>

  <line x1="320" y1="220" x2="160" y2="220" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="240" y="213" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#3fb950">No</text>

  <rect x="40" y="195" width="120" height="50" rx="8" fill="#0f1a10" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="218" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#3fb950">Write to slot</text>
  <text x="100" y="235" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">normal path</text>

  <line x1="400" y1="265" x2="400" y2="300" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="413" y="285" font-family="-apple-system, sans-serif" font-size="10" font-weight="bold" fill="#f0883e">Yes</text>

  <polygon points="400,305 470,345 400,385 330,345" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="348" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#d2a8ff">Overflow Policy</text>

  <line x1="330" y1="345" x2="95" y2="440" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="355" y1="375" x2="285" y2="440" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="400" y1="385" x2="400" y2="430" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="400" y1="430" x2="485" y2="440" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <line x1="445" y1="375" x2="685" y2="440" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <rect x="20" y="450" width="150" height="65" rx="8" fill="#0d1a33" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="475" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Block</text>
  <text x="95" y="494" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#58a6ff" opacity="0.7">Wait for consumer</text>
  <text x="95" y="507" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#484f58">to free a slot</text>

  <rect x="210" y="450" width="150" height="65" rx="8" fill="#3d1414" stroke="#f85149" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="285" y="475" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#f85149">DropNewest</text>
  <text x="285" y="494" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.7">Discard incoming</text>
  <text x="285" y="507" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#484f58">+ drop counter</text>

  <rect x="410" y="450" width="150" height="65" rx="8" fill="#1a120a" stroke="#f0883e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="485" y="475" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#f0883e">DropOldest</text>
  <text x="485" y="494" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f0883e" opacity="0.7">Overwrite oldest</text>
  <text x="485" y="507" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#484f58">+ advance tail</text>

  <rect x="610" y="450" width="150" height="65" rx="8" fill="#1a1520" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="685" y="475" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Reject</text>
  <text x="685" y="494" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#d2a8ff" opacity="0.7">Return error</text>
  <text x="685" y="507" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#484f58">to caller</text>
</svg>
