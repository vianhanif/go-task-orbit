<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3fb950"/>
    </marker>
    <marker id="aOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f0883e"/>
    </marker>
  </defs>
  <rect width="600" height="400" rx="8" fill="url(#bg)"/>
  <text x="300" y="32" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="13" font-weight="bold" fill="#e6edf3">Backpressure Policies</text>
  <!-- Producer -->
  <rect x="220" y="55" width="160" height="45" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="300" y="76" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#58a6ff">Producer: Enqueue msg</text>
  <text x="300" y="91" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Enqueue →</text>
  <!-- Buffer full? -->
  <polygon points="300,118 240,138 300,158 360,138" fill="#1c2333" stroke="#f0883e" stroke-width="1.8"/>
  <text x="300" y="141" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#f0883e">Buffer full?</text>
  <!-- Arrow from Producer to Buffer full -->
  <line x1="300" y1="100" x2="300" y2="114" stroke="#58a6ff" stroke-width="2" marker-end="url(#aBlue)"/>
  <!-- No branch to Write -->
  <line x1="240" y1="138" x2="120" y2="138" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="120" y1="138" x2="120" y2="188" stroke="#3fb950" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="180" y="132" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">No</text>
  <rect x="50" y="192" width="140" height="40" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="216" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#3fb950">Write to slot</text>
  <!-- Yes branch to Overflow Policy -->
  <line x1="360" y1="138" x2="480" y2="138" stroke="#8b949e" stroke-width="1.5"/>
  <line x1="480" y1="138" x2="480" y2="188" stroke="#f0883e" stroke-width="1.5" marker-end="url(#aOrange)"/>
  <text x="420" y="132" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Yes</text>
  <polygon points="480,212 440,228 480,244 520,228" fill="#1c2333" stroke="#f0883e" stroke-width="1.8"/>
  <text x="480" y="225" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="bold" fill="#f0883e">Overflow</text>
  <text x="480" y="239" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" font-weight="bold" fill="#f0883e">Policy</text>
  <!-- Branch lines from overflow policy -->
  <line x1="440" y1="228" x2="440" y2="268" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="480" y1="244" x2="480" y2="268" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="520" y1="228" x2="520" y2="268" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="560" y1="228" x2="560" y2="268" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <!-- Horizontal connector -->
  <line x1="440" y1="268" x2="560" y2="268" stroke="#d2a8ff" stroke-width="1"/>
  <!-- 4 policy boxes -->
  <rect x="30" y="280" width="128" height="48" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="94" y="302" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#d2a8ff">Block</text>
  <text x="94" y="318" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Wait for slot</text>
  <rect x="168" y="280" width="128" height="48" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="232" y="302" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#d2a8ff">DropNewest</text>
  <text x="232" y="318" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Discard incoming</text>
  <rect x="306" y="280" width="128" height="48" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="370" y="302" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#d2a8ff">DropOldest</text>
  <text x="370" y="318" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Overwrite oldest</text>
  <rect x="444" y="280" width="128" height="48" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="508" y="302" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="bold" fill="#d2a8ff">Reject</text>
  <text x="508" y="318" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8b949e">Return error</text>
  <!-- Vertical connectors from overflow to each box -->
  <line x1="94" y1="268" x2="94" y2="275" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="232" y1="268" x2="232" y2="275" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="370" y1="268" x2="370" y2="275" stroke="#d2a8ff" stroke-width="1.5"/>
  <line x1="508" y1="268" x2="508" y2="275" stroke="#d2a8ff" stroke-width="1.5"/>
  <!-- Subtitle -->
  <text x="300" y="368" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Go channels can only Block. The ring buffer supports all four policies.</text>
</svg>
