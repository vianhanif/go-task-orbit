<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d2a8ff"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0883e"/>
    </marker>
  </defs>

  <rect width="800" height="350" rx="16" fill="url(#bg)"/>

  <text x="400" y="45" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Redis Polling (go-workers style)</text>
  <text x="400" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#8b949e">network hop per message · Redis bottleneck · constant polling</text>

  <rect x="40" y="155" width="120" height="55" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="180" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#58a6ff">Producer</text>
  <text x="100" y="198" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">LPUSH</text>

  <line x1="160" y1="182" x2="268" y2="182" stroke="#58a6ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="214" y="174" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">push job</text>

  <ellipse cx="370" cy="155" rx="70" ry="18" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <path d="M 300 155 L 300 235 A 70 18 0 0 0 440 235 L 440 155" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <ellipse cx="370" cy="235" rx="70" ry="18" fill="#1a120a" stroke="#f0883e" stroke-width="1.5"/>
  <ellipse cx="370" cy="155" rx="70" ry="18" fill="none" stroke="#f0883e" stroke-width="1"/>
  <text x="370" y="185" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="bold" fill="#f0883e">Redis</text>
  <text x="370" y="205" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">bottleneck</text>

  <rect x="510" y="120" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="147" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Worker 1</text>
  <rect x="510" y="180" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="207" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Worker 2</text>
  <rect x="510" y="240" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="565" y="267" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">Worker 3</text>

  <line x1="510" y1="143" x2="440" y2="170" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="460" y="138" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">BRPOP</text>
  <text x="475" y="168" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e" opacity="0.6">(poll)</text>

  <line x1="510" y1="202" x2="440" y2="202" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="480" y="194" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">BRPOP</text>
  <text x="485" y="218" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e" opacity="0.6">(poll)</text>

  <line x1="510" y1="262" x2="440" y2="232" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="480" y="258" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">BRPOP</text>
  <text x="485" y="255" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#8b949e" opacity="0.6">(poll)</text>

  <rect x="630" y="130" width="155" height="155" rx="10" fill="#3d1414" stroke="#f85149" stroke-width="1" opacity="0.6"/>
  <text x="707" y="155" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" fill="#f85149">Issues</text>
  <text x="707" y="178" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">Network: 1-5ms/job</text>
  <text x="707" y="198" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">Redis is single</text>
  <text x="707" y="218" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">contention point</text>
  <text x="707" y="245" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">Constant polling</text>
  <text x="707" y="265" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.8">No batching</text>
</svg>
