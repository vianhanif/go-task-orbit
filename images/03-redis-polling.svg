<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#58a6ff"/></marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#3fb950"/></marker>
  </defs>
  <rect width="520" height="260" rx="12" fill="url(#bg)"/>
  <text x="260" y="32" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="15" font-weight="bold" fill="#e6edf3">Redis Polling</text>

  <!-- Producer - left -->
  <rect x="20" y="95" width="110" height="45" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="75" y="122" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">Producer</text>

  <!-- Redis - center -->
  <ellipse cx="220" cy="118" rx="60" ry="55" fill="#161b22" stroke="#f0883e" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="220" y="114" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="16" font-weight="bold" fill="#f0883e">Redis</text>
  <text x="220" y="134" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#8b949e">(blocking)</text>

  <!-- Workers - right column, aligned -->
  <rect x="340" y="62" width="140" height="38" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="85" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">Worker 1</text>
  <rect x="340" y="110" width="140" height="38" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="133" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">Worker 2</text>
  <rect x="340" y="158" width="140" height="38" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="181" text-anchor="middle" font-family="SF Mono,Menlo,Consolas,monospace" font-size="11" fill="#e6edf3">Worker 3</text>

  <!-- Arrows -->
  <line x1="130" y1="118" x2="158" y2="118" stroke="#58a6ff" stroke-width="3" marker-end="url(#aBlue)"/>
  <text x="144" y="110" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#58a6ff">LPUSH</text>
  <line x1="282" y1="86" x2="335" y2="81" stroke="#3fb950" stroke-width="2" marker-end="url(#aGreen)" opacity="0.7"/>
  <text x="308" y="78" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3fb950" opacity="0.7">BRPOP (poll)</text>
  <line x1="282" y1="118" x2="335" y2="129" stroke="#3fb950" stroke-width="2" marker-end="url(#aGreen)" opacity="0.7"/>
  <line x1="282" y1="150" x2="335" y2="177" stroke="#3fb950" stroke-width="2" marker-end="url(#aGreen)" opacity="0.7"/>
</svg>
