<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="500" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
    </marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#3fb950"/>
    </marker>
  </defs>
  <rect width="500" height="240" rx="8" fill="url(#bg)"/>
  <text x="250" y="30" text-anchor="middle" font-family="SF Mono,Menlo,monospace" font-size="13" font-weight="bold" fill="#e6edf3">Redis Polling</text>
  <!-- Producer -->
  <rect x="25" y="90" width="100" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="75" y="114" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#e6edf3">Producer</text>
  <!-- Redis -->
  <ellipse cx="210" cy="110" rx="55" ry="50" fill="#161b22" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="210" y="107" text-anchor="middle" font-family="SF Mono,monospace" font-size="13" font-weight="bold" fill="#f0883e">Redis</text>
  <text x="210" y="124" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">(blocking)</text>
  <!-- Workers -->
  <rect x="320" y="58" width="130" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="385" y="79" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#e6edf3">Worker 1</text>
  <rect x="320" y="108" width="130" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="385" y="129" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#e6edf3">Worker 2</text>
  <rect x="320" y="158" width="130" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="385" y="179" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#e6edf3">Worker 3</text>
  <!-- Arrows -->
  <line x1="125" y1="110" x2="152" y2="110" stroke="#58a6ff" stroke-width="2.2" marker-end="url(#aBlue)"/>
  <text x="138" y="103" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#58a6ff" opacity="0.7">LPUSH</text>
  <line x1="266" y1="82" x2="315" y2="75" stroke="#3fb950" stroke-width="1.8" marker-end="url(#aGreen)" opacity="0.7"/>
  <text x="290" y="72" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#3fb950" opacity="0.7">BRPOP (poll)</text>
  <line x1="266" y1="110" x2="315" y2="125" stroke="#3fb950" stroke-width="1.8" marker-end="url(#aGreen)" opacity="0.7"/>
  <line x1="266" y1="110" x2="315" y2="175" stroke="#3fb950" stroke-width="1.8" marker-end="url(#aGreen)" opacity="0.7"/>
</svg>
