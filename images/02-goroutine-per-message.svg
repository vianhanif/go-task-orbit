<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149"/>
    </marker>
  </defs>

  <rect width="800" height="420" rx="16" fill="url(#bg)"/>

  <text x="400" y="45" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Goroutine Per Message</text>
  <text x="400" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#8b949e">unbounded goroutines → CPU thrashing, no backpressure</text>

  <rect x="300" y="95" width="200" height="55" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="120" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="14" font-weight="bold" fill="#3fb950">SQS Poller</text>
  <text x="400" y="138" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">spawns goroutine per msg</text>

  <rect x="40" y="200" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="227" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">goroutine 1</text>
  <rect x="185" y="200" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="240" y="227" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">goroutine 2</text>
  <rect x="330" y="200" width="110" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="385" y="227" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">goroutine 3</text>
  <rect x="475" y="200" width="120" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="535" y="227" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="12" font-weight="bold" fill="#d2a8ff">goroutine ...N</text>
  <rect x="630" y="200" width="130" height="45" rx="8" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="695" y="227" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#d2a8ff" opacity="0.6">goroutine ∞</text>

  <line x1="400" y1="150" x2="95" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="150" x2="240" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="150" x2="385" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="150" x2="535" y2="200" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="400" y1="150" x2="695" y2="200" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <rect x="220" y="290" width="360" height="55" rx="10" fill="#3d1414" stroke="#f85149" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="315" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="14" font-weight="bold" fill="#f85149">CPU Thrashing</text>
  <text x="400" y="333" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#f85149" opacity="0.7">scheduler context-switching dominates</text>

  <line x1="95" y1="245" x2="250" y2="290" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="240" y1="245" x2="310" y2="290" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="385" y1="245" x2="390" y2="290" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="535" y1="245" x2="480" y2="290" stroke="#f85149" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="695" y1="245" x2="560" y2="290" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>

  <text x="400" y="380" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#f85149" opacity="0.8">Thousands of goroutines × 2KB stack each + no backpressure = system collapse under load</text>
</svg>
