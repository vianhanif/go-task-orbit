<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" width="700" height="350">
  <rect width="700" height="350" rx="8" fill="#0d1117"/>
  <text x="350" y="35" text-anchor="middle" font-family="SF Mono, monospace" font-size="13" font-weight="bold" fill="#e6edf3">The Flow</text>
  <rect x="20" y="100" width="120" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="80" y="123" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#3fb950">SQS Poller</text>
  <text x="80" y="138" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">batch RecvMsg</text>
  <rect x="20" y="200" width="120" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="80" y="225" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#3fb950">Ack Batcher</text>
  <text x="80" y="240" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">DeleteMsgBatch</text>
  <rect x="240" y="130" width="130" height="60" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="305" y="158" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#58a6ff">Ring Buffer</text>
  <text x="305" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">write/read slots</text>
  <rect x="450" y="130" width="130" height="60" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="515" y="158" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#d2a8ff">Dispatcher</text>
  <text x="515" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">batch dispatch</text>
  <rect x="450" y="230" width="130" height="60" rx="6" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="515" y="258" text-anchor="middle" font-family="SF Mono, monospace" font-size="11" fill="#d2a8ff">Worker Pool</text>
  <text x="515" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">bounded process</text>
  <rect x="240" y="230" width="130" height="60" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="305" y="258" text-anchor="middle" font-family="SF Mono, monospace" font-size="10" fill="#f0883e">Results</text>
  <text x="305" y="275" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8b949e">Ack/Retry/DLQ</text>
  <line x1="140" y1="125" x2="235" y2="150" stroke="#58a6ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="190" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">EnqueueBatch</text>
  <line x1="370" y1="160" x2="445" y2="160" stroke="#d2a8ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="410" y="153" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">ReadBatch</text>
  <line x1="515" y1="190" x2="515" y2="225" stroke="#d2a8ff" stroke-width="2" marker-end="url(#a)"/>
  <text x="530" y="212" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d2a8ff" opacity="0.7">SubmitBatch</text>
  <line x1="450" y1="260" x2="375" y2="260" stroke="#f0883e" stroke-width="2" marker-end="url(#a)"/>
  <text x="410" y="253" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f0883e" opacity="0.7">results</text>
  <line x1="240" y1="260" x2="145" y2="225" stroke="#f0883e" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)" opacity="0.7"/>
  <text x="190" y="248" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#f0883e" opacity="0.7">DeleteMessageBatch</text>
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/></marker></defs>
</svg>
