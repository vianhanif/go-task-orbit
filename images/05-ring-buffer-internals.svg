<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="800" height="380" rx="16" fill="url(#bg)"/>

  <text x="400" y="45" text-anchor="middle" font-family="SF Mono, Menlo, Monaco, Consolas, monospace" font-size="22" font-weight="bold" fill="#e6edf3" filter="url(#shadow)">Ring Buffer Internals</text>
  <text x="400" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, sans-serif" font-size="12" fill="#8b949e">power-of-two sizing · atomic head/tail cursors · lock-free concurrent access</text>

  <rect x="30" y="100" width="160" height="230" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="128" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" fill="#58a6ff">Write Side</text>
  <text x="110" y="145" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">(Producer)</text>
  <rect x="50" y="165" width="120" height="45" rx="8" fill="#0d1a33" stroke="#58a6ff" stroke-width="1" opacity="0.8"/>
  <text x="110" y="185" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#58a6ff">Head Cursor</text>
  <text x="110" y="202" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#58a6ff" opacity="0.7">atomic.Uint64</text>

  <line x1="170" y1="188" x2="220" y2="170" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="220" y="100" width="360" height="230" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="122" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" fill="#e6edf3">Slots</text>

  <rect x="235" y="140" width="160" height="45" rx="6" fill="#0d1a33" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
  <text x="315" y="158" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#58a6ff">Slot 0</text>
  <text x="315" y="175" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">seq: 42 · msg ref</text>

  <rect x="235" y="195" width="160" height="45" rx="6" fill="#0f1a10" stroke="#3fb950" stroke-width="1" opacity="0.7"/>
  <text x="315" y="213" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#3fb950">Slot 1</text>
  <text x="315" y="230" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">seq: 43 · msg ref</text>

  <rect x="235" y="250" width="160" height="45" rx="6" fill="#1a1520" stroke="#d2a8ff" stroke-width="1" opacity="0.7"/>
  <text x="315" y="268" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#d2a8ff">Slot 2</text>
  <text x="315" y="285" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">seq: 44 · msg ref</text>

  <rect x="410" y="140" width="155" height="45" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <text x="487" y="166" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#8b949e">Slot 3</text>
  <text x="487" y="180" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#484f58">empty</text>

  <rect x="410" y="200" width="155" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  <text x="487" y="225" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#8b949e" opacity="0.5">Slot 4</text>

  <rect x="410" y="250" width="155" height="40" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1" opacity="0.2"/>
  <text x="487" y="275" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#8b949e" opacity="0.4">Slot 5...</text>

  <rect x="610" y="100" width="160" height="230" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="128" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" font-weight="bold" fill="#3fb950">Read Side</text>
  <text x="690" y="145" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="10" fill="#8b949e">(Consumer)</text>
  <rect x="630" y="165" width="120" height="45" rx="8" fill="#0f1a10" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
  <text x="690" y="185" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="11" font-weight="bold" fill="#3fb950">Tail Cursor</text>
  <text x="690" y="202" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#3fb950" opacity="0.7">atomic.Uint64</text>

  <path d="M 395 273 L 600 273 L 620 200" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <text x="218" y="155" font-family="-apple-system, sans-serif" font-size="9" fill="#58a6ff" opacity="0.7">write at</text>
  <text x="218" y="278" font-family="-apple-system, sans-serif" font-size="9" fill="#3fb950" opacity="0.7">read at</text>

  <rect x="230" y="315" width="340" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="335" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#8b949e">seq &amp; mask → index</text>
  <text x="400" y="350" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="9" fill="#484f58">bitwise AND = cheap modulo (no division)</text>
</svg>
